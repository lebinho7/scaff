              <div class="sim-card" id="sim-c-${c.id}" draggable="true" ondragstart="simDragStart(event, '${c.id}')" ondragend="simDragEnd(event)"
                style="background:${c.color};color:#222;border-color:${c.border};position:relative">
                <div onclick="deleteSimClass('${c.id}', ${c.custom})" title="${c.custom ? 'Excluir definitivamente' : 'Ocultar da gaveta'}" style="position:absolute;top:-6px;right:-6px;background:var(--coral);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;line-height:18px;cursor:pointer;opacity:0.9;z-index:15">✕</div>
                <div class="sim-card-icon">${c.icon}</div>
                <div style="line-height:1.3">${esc(c.name)}</div>
                <div style="font-size:8.5px;margin-top:4px;opacity:0.6">(${esc(c.prof)})</div>
              </div>
            `).join('')}
            ${availableClasses.length === 0 ? '<div style="font-size:12px;color:var(--muted);padding:20px;text-align:center;width:100%">Todas as disciplinas alocadas!</div>' : ''}
          </div>
          
          <div class="sim-footer">
            <div class="sim-ch-status" style="font-family:var(--sans)">Carga Horária: <strong style="color:${isValidStatus || totalCredits===0 ? 'var(--teal)' : 'var(--coral)'};font-size:14px">${totalCredits}h</strong> / Mínima: 12h / Máxima: 28h</div>
            <button class="sim-btn-save" onclick="simSave()">Salvar Simulação</button>
          </div>
        </div>
      </div>`;
      
      panel.innerHTML = html;
    }

    function simDragStart(e, cid) {
      simDraggedId = cid;
      e.dataTransfer.setData('text/plain', cid);
      setTimeout(() => e.target.classList.add('dragging'), 10);
      
      const cls = SIMULATOR_CLASSES.find(c => c.id === cid);
      cls.schedule.forEach(slot => {
        const el = document.getElementById('slot-' + slot);
        if (el) {
          const isFull = simEnrolled.some(id => SIMULATOR_CLASSES.find(c=>c.id===id).schedule.includes(slot));
          if (isFull) el.classList.add('conflict');
          else el.classList.add('valid-target');
        }
      });
    }

    function simDragEnd(e) {
      e.target.classList.remove('dragging');
      simDraggedId = null;
      document.querySelectorAll('.sim-slot').forEach(el => {
        el.classList.remove('valid-target', 'conflict', 'hover-active');
      });
    }

    function simDragOver(e) {
      e.preventDefault();
      const target = e.currentTarget;
      if (target.classList.contains('valid-target')) target.classList.add('hover-active');
    }

    function simDragLeave(e) {
      e.currentTarget.classList.remove('hover-active');
    }

    function simDrop(e, slotId) {
      e.preventDefault();
      e.currentTarget.classList.remove('hover-active');
      if (!simDraggedId) return;
      
      const cls = SIMULATOR_CLASSES.find(c => c.id === simDraggedId);
      if (!cls.schedule.includes(slotId)) return;
      
      let hasConflict = false;
      cls.schedule.forEach(s => {
        if(simEnrolled.some(id => SIMULATOR_CLASSES.find(c=>c.id===id).schedule.includes(s))) hasConflict = true;
      });
      
      if (hasConflict) {
        const slotEl = document.getElementById('slot-' + slotId);
        if(slotEl) {
           slotEl.style.transition = 'none';
           slotEl.style.transform = 'translate(-6px, 0)';
           setTimeout(()=> slotEl.style.transform = 'translate(6px, 0)', 50);
           setTimeout(()=> slotEl.style.transform = 'translate(-4px, 0)', 100);
           setTimeout(()=> slotEl.style.transform = 'translate(2px, 0)', 150);
           setTimeout(()=> { slotEl.style.transform = 'none'; slotEl.style.transition = 'all .2s ease'; }, 200);
        }
        return;
      }
      
      simEnrolled.push(simDraggedId);
      renderSimulator();
    }
    
    function simRemoveClass(cid) {
      simEnrolled = simEnrolled.filter(id => id !== cid);
      renderSimulator();
    }

    function simDragOverDrawer(e) { e.preventDefault(); }
    function simDropDrawer(e) { }

    function simSave() {
      if (simEnrolled.length === 0) { alert('Sua grade está vazia!'); return; }
      saveData('simulator_state', simEnrolled);
      if (confirm('Simulação salva com sucesso! Deseja compartilhar sua grade de horários gerada na aba Comunidade?')) {
        const user = document.getElementById('topbar-username').textContent || 'Aluno';
        const msg = `Acabei de montar minha grade pelo Simulador! O que acham?\n` +
          simEnrolled.map(id => {
            const c = SIMULATOR_CLASSES.find(x=>x.id===id);
            return `• ${c.name} (${c.schedule.join(', ')})`;
          }).join('\n');
          
        db.collection('global_forum').add({
          name: user,
          channel: 'geral',
          text: msg,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          likes: 0
        }).then(() => {
          alert('Grade publicada na comunidade!');
          showCommunity();
        }).catch(() => {
          alert('Erro ao publicar. Você precisa estar logado com conta oficial (sem modo Demo).');
        });
      }
    }

    function openSimAddModal() {
      simDraftSchedule = [];
      document.getElementById('sim-new-name').value = '';
      document.getElementById('sim-new-prof').value = '';
      document.getElementById('sim-new-credits').value = '4';
      document.getElementById('sim-new-color').value = '#c4f4f7';
      renderSimSchGrid();
      document.getElementById("modal-sim-add").classList.add("open");
    }

    function closeSimAddModal() {
      document.getElementById("modal-sim-add").classList.remove("open");
      const err = document.getElementById('sim-add-error');
      if (err) err.classList.remove('show');
    }

    function renderSimSchGrid() {
      const g = document.getElementById('sim-sch-grid');
      const days = ['SEG', 'TER', 'QUA', 'QUI', 'SEX'];
      const timeIds = ['08', '10', '14', '16'];
      let html = '';
      days.forEach(d => { html += `<div style="font-size:10px;font-weight:800;color:var(--muted);padding-bottom:4px">${d}</div>`; });
      timeIds.forEach(t => {
        days.forEach(d => {
           const id = `${d}_${t}`;
           const sel = simDraftSchedule.includes(id);
           html += `<div onclick="toggleSimDraftSlot('${id}')" title="${d} ${t}h" style="background:${sel?'var(--teal)':'var(--paper)'};color:${sel?'#fff':'var(--muted)'};border-radius:6px;padding:6px;font-size:11px;cursor:pointer;border:2px solid ${sel?'var(--teal)':'transparent'};font-weight:700;transition:all .1s">${t}h</div>`;
        });
      });
      g.innerHTML = html;
    }

    function toggleSimDraftSlot(id) {
      if(simDraftSchedule.includes(id)) { simDraftSchedule = simDraftSchedule.filter(x=>x!==id); }
      else { simDraftSchedule.push(id); }
      renderSimSchGrid();
    }

    function darkenHex(col) {
      if(!col || col.length < 7) return '#000000';
      let r = parseInt(col.substr(1,2),16), g = parseInt(col.substr(3,2),16), b = parseInt(col.substr(5,2),16);
      return '#' + [r,g,b].map(x => Math.max(0, x - 30).toString(16).padStart(2,'0')).join('');
    }

    function saveSimCustomClass() {
      const name = document.getElementById('sim-new-name').value.trim();
      const prof = document.getElementById('sim-new-prof').value.trim();
      const cred = parseInt(document.getElementById('sim-new-credits').value);
      const icon = document.getElementById('sim-new-icon').value;
      const col = document.getElementById('sim-new-color').value;
      const err = document.getElementById('sim-add-error');
      
      err.classList.remove('show');
      if(!name || !prof) { err.textContent = 'Preencha o nome da disciplina e o professor.'; err.classList.add('show'); return; }
      if(simDraftSchedule.length === 0) { err.textContent = 'Selecione pelo menos um bloco de horário na grade geométrica.'; err.classList.add('show'); return; }

      const newClass = {
        id: 'c_custom_' + Date.now(),
        name: name, prof: prof,
        ch: cred * 16, credits: cred,
        schedule: [...simDraftSchedule],
        color: col, border: darkenHex(col), icon: icon, custom: true
      };

      SIMULATOR_CLASSES.push(newClass);
      saveData('simulator_custom_classes', SIMULATOR_CLASSES);
      closeSimAddModal();
      renderSimulator();
    }

    function deleteSimClass(id, isCustom) {
      const msg = isCustom ? 'Deletar esta disciplina definitivamente do seu catálogo?' : 'Ocultar esta disciplina padrão da sua gaveta?';
      if(!confirm(msg)) return;
      SIMULATOR_CLASSES = SIMULATOR_CLASSES.filter(c => c.id !== id);
      simEnrolled = simEnrolled.filter(cid => cid !== id);
      saveData('simulator_custom_classes', SIMULATOR_CLASSES);
      saveData('simulator_state', simEnrolled);
      renderSimulator();
    }


    /* ═══ PASSWORD TOGGLE ═══ */
    function togglePassVis() {
      const inp = document.getElementById('inp-pass'), btn = document.getElementById('pass-toggle-btn');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁';
      btn.setAttribute('aria-label', show ? 'Ocultar senha' : 'Mostrar senha');
      btn.title = show ? 'Ocultar senha' : 'Mostrar senha';
    }

    /* ═══ ADD MODAL ═══ */
    let lastFocused = null;
    function openAddModal() { lastFocused = document.activeElement; document.getElementById("modal-adddis").classList.add("open"); requestAnimationFrame(() => document.getElementById("new-code").focus()) }
    function closeAddModal() { document.getElementById("modal-adddis").classList.remove("open"); if (lastFocused) { lastFocused.focus(); lastFocused = null } }
    document.getElementById("modal-adddis").addEventListener("keydown", function (e) { if (e.key === 'Tab') { const f = this.querySelectorAll('input,button,[tabindex]:not([tabindex="-1"])'); if (!f.length) return; const first = f[0], last = f[f.length - 1]; if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus() } } else { if (document.activeElement === last) { e.preventDefault(); first.focus() } } } });
    document.getElementById("modal-adddis").addEventListener("click", function (e) { if (e.target === this) closeAddModal() });
    document.querySelectorAll(".color-swatch").forEach(sw => { sw.addEventListener("click", function () { document.querySelectorAll(".color-swatch").forEach(s => { s.classList.remove("selected"); s.setAttribute('aria-checked', 'false') }); this.classList.add("selected"); this.setAttribute('aria-checked', 'true'); STATE.selectedColor = this.dataset.color }) });
    function addDiscipline() {
      const code = document.getElementById("new-code").value.trim(), name = document.getElementById("new-name").value.trim(), sem = document.getElementById("new-sem").value.trim() || "—", book = document.getElementById("new-book").value.trim() || "—";
      if (!code || !name) { alert("Preencha o código e o nome."); return }
      const id = code.toLowerCase().replace(/\W/g, "") + Date.now();
      STATE.disciplines.push({ id, code, name, sem, book, color: STATE.selectedColor, weeks: [{ num: "01", mod: "A", title: "Semana inicial — adicione conteúdo", cap: "—" }] });
      closeAddModal();["new-code", "new-name", "new-sem", "new-book"].forEach(x => document.getElementById(x).value = ""); renderTabs(); renderAppBody(); openDisc(id)
    }

    /* ═══ KEYBOARD ═══ */
    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && document.getElementById("modal-adddis").classList.contains("open")) closeAddModal();
      if (e.key === "Enter" && document.getElementById("screen-login").classList.contains("active")) {
        if (document.getElementById('form-register').style.display !== 'none') doRegister();
        else doLogin();
      }
    });

    /* ═══ AUTO-LOGIN (Firebase) ═══ */
    auth.onAuthStateChanged(user => {
      if (user) { enterApp(user) }
    });

    /* ═══ PWA SERVICE WORKER ═══ */
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => { }) }
  </script>
</body>
