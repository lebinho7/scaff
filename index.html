<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scaff — Biblioteca de Disciplinas</title>
<meta name="description" content="Scaff — Plataforma de gerenciamento de disciplinas universitárias com visualização de PDFs, acompanhamento de progresso e biblioteca organizada por semanas.">
<meta property="og:title" content="Scaff — Biblioteca de Disciplinas">
<meta property="og:description" content="Gerencie suas disciplinas universitárias com progresso de estudo, PDFs organizados por semana e design premium.">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23E8553E'/%3E%3Ctext x='3' y='23' font-family='Arial,sans-serif' font-weight='900' font-size='17' fill='white'%3Esc%3C/text%3E%3Ctext x='19' y='23' font-family='Arial,sans-serif' font-weight='900' font-size='17' fill='%231A5F6E'%3Eff%3C/text%3E%3Ctext x='27' y='11' font-family='Arial,sans-serif' font-size='9' fill='%23E8C547'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --coral:#E8553E;--coral-dk:#c63d28;--coral-lt:rgba(232,85,62,.10);
  --teal:#1A5F6E;--teal-dk:#124450;--teal-lt:rgba(26,95,110,.08);
  --gold:#E8C547;--gold-lt:rgba(232,197,71,.18);
  --ink:#1a1a1a;--paper:#F7F3EC;--paper2:#EDE8DF;--paper3:#E2DDD3;
  --card-bg:#fff;--muted:#7a7870;
  --rule:rgba(26,26,26,.11);--rule2:rgba(26,26,26,.055);
  --shadow:0 2px 20px rgba(232,85,62,.07);--shadow-lg:0 8px 40px rgba(26,26,26,.13);
  --r:8px;--r-sm:5px;
  --sans:'Nunito',Arial,Helvetica,sans-serif;--mono:'Courier New',Courier,monospace;
  --topbar-bg:var(--coral);--viewer-bg:#1e1e1e;--viewer-toolbar:#161616;
}
html.dark {
  --ink:#e4e0d8;--paper:#141210;--paper2:#1c1a16;--paper3:#24221c;
  --card-bg:#1e1c18;--muted:#9a9488;
  --rule:rgba(255,255,255,.1);--rule2:rgba(255,255,255,.04);
  --shadow:0 2px 20px rgba(0,0,0,.3);--shadow-lg:0 8px 40px rgba(0,0,0,.5);
  --topbar-bg:#2a1410;--viewer-bg:#141210;--viewer-toolbar:#0e0d0b;
  --coral-lt:rgba(232,85,62,.15);--teal-lt:rgba(26,95,110,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:400;line-height:1.65;min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
.skip-link{position:absolute;top:-50px;left:0;background:var(--coral);color:#fff;padding:8px 18px;z-index:10000;font-size:14px;font-weight:700;text-decoration:none;border-radius:0 0 8px 0;transition:top .2s}.skip-link:focus{top:0}
.screen{display:none;min-height:100vh}.screen.active{display:flex}

/* LOGIN */
#screen-login{flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;position:relative;background:linear-gradient(145deg,#fdf9f4 0%,var(--paper) 55%,#eee8dd 100%);transition:background .4s}
html.dark #screen-login{background:linear-gradient(145deg,#1e1c18 0%,var(--paper) 55%,#1a1816 100%)}
#screen-login::before{content:'';position:absolute;top:-120px;right:-80px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,var(--coral-lt) 0%,transparent 70%);pointer-events:none}
#screen-login::after{content:'';position:absolute;bottom:-80px;left:-60px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(26,95,110,.07) 0%,transparent 70%);pointer-events:none}
.login-card{position:relative;z-index:2;background:var(--card-bg);border:1px solid var(--rule);border-radius:16px;padding:48px 44px 40px;width:100%;max-width:420px;box-shadow:0 12px 48px rgba(232,85,62,.10),0 2px 12px rgba(26,26,26,.07);transition:background .4s,border-color .4s,box-shadow .4s}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo .wordmark{font-family:var(--sans);font-size:3.6rem;font-weight:800;line-height:1;letter-spacing:-.02em;display:inline-block;position:relative}
.wordmark .sc{color:var(--coral)}.wordmark .a{color:var(--coral)}.wordmark .ff{color:var(--teal);position:relative}
.wordmark .spark{position:absolute;top:-6px;right:-18px;font-size:1rem;line-height:1;color:var(--gold);transform:rotate(15deg);display:inline-block;animation:sparkle 2.4s ease-in-out infinite}
@keyframes sparkle{0%,100%{transform:rotate(15deg) scale(1);opacity:1}50%{transform:rotate(20deg) scale(1.2);opacity:.75}}
.login-logo .tagline{font-size:13px;font-weight:500;color:var(--teal);margin-top:8px}
.login-logo .rule-deco{width:36px;height:3px;background:var(--coral);border-radius:2px;margin:12px auto 0}
.login-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;display:block}
.login-input{width:100%;background:var(--paper);border:1.5px solid var(--rule);border-radius:var(--r-sm);padding:12px 15px;font-family:var(--sans);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s,background .4s;margin-bottom:18px}
.login-input:focus{border-color:var(--coral);box-shadow:0 0 0 3px var(--coral-lt)}
.pass-wrap{position:relative;margin-bottom:18px}.pass-wrap .login-input{margin-bottom:0;padding-right:44px}
.pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);padding:4px;line-height:1;transition:color .15s;border-radius:4px}
.pass-toggle:hover{color:var(--coral)}.pass-toggle:focus-visible{outline:2px solid var(--coral);outline-offset:2px}
.viewer-frame{flex:1;width:100%;border:none;background:#fff}
.login-btn{width:100%;background:var(--coral);color:#fff;border:none;border-radius:var(--r-sm);padding:14px;font-size:14px;font-weight:800;letter-spacing:.04em;cursor:pointer;transition:background .18s,transform .12s,box-shadow .18s;box-shadow:0 4px 16px rgba(232,85,62,.3)}
.login-btn:hover{background:var(--coral-dk);transform:translateY(-1px);box-shadow:0 6px 22px rgba(232,85,62,.38)}.login-btn:active{transform:translateY(0)}
.login-error{background:rgba(232,85,62,.07);border:1.5px solid rgba(232,85,62,.35);border-radius:var(--r-sm);padding:10px 14px;font-size:12px;font-weight:600;color:var(--coral-dk);margin-top:14px;display:none;text-align:center}.login-error.show{display:block}
.login-hint{font-size:11px;font-weight:500;color:var(--muted);text-align:center;margin-top:22px}

/* APP */
#screen-app{flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;background:var(--topbar-bg);display:flex;align-items:center;padding:0 28px;height:54px;border-bottom:2px solid rgba(0,0,0,.08);box-shadow:0 2px 12px rgba(232,85,62,.25);transition:background .4s}
.topbar-logo{font-size:1.55rem;font-weight:800;letter-spacing:-.02em;margin-right:24px;flex-shrink:0;display:flex;align-items:baseline;position:relative}
.topbar-logo .tl-sc,.topbar-logo .tl-a{color:#fff}.topbar-logo .tl-ff{color:var(--teal-dk)}
html.dark .topbar-logo .tl-ff{color:#7ac0d0}
.topbar-logo .tl-spark{font-size:.65rem;color:var(--gold);margin-left:1px;align-self:flex-start;margin-top:3px}
.tabs-bar{display:flex;align-items:stretch;flex:1;overflow-x:auto;height:100%;scrollbar-width:none}.tabs-bar::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:7px;padding:0 16px;font-size:12px;font-weight:600;color:rgba(255,255,255,.65);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .18s,border-color .18s,background .18s;user-select:none;flex-shrink:0;height:100%}
.tab:hover{color:rgba(255,255,255,.9);background:rgba(0,0,0,.06)}.tab.active{color:#fff;border-bottom-color:var(--gold);background:rgba(0,0,0,.10);font-weight:700}
.tab .tab-close{width:16px;height:16px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:inherit;opacity:0;font-size:12px;display:flex;align-items:center;justify-content:center;transition:opacity .15s,background .15s;margin-left:2px}
.tab:hover .tab-close{opacity:.6}.tab .tab-close:hover{opacity:1!important;background:rgba(0,0,0,.15)}
.tab-add-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;margin:auto 6px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);cursor:pointer;font-size:20px;flex-shrink:0;transition:background .18s,color .18s;font-weight:300;line-height:1}
.tab-add-btn:hover{background:rgba(255,255,255,.28);color:#fff}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;padding-left:16px;flex-shrink:0}
.topbar-user{font-size:12px;font-weight:600;color:rgba(255,255,255,.6)}
.topbar-logout,.topbar-theme{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;color:rgba(255,255,255,.75);background:rgba(0,0,0,.12);border:1.5px solid rgba(255,255,255,.2);padding:5px 12px;border-radius:20px;transition:all .15s}
.topbar-logout:hover,.topbar-theme:hover{color:#fff;background:rgba(0,0,0,.22);border-color:rgba(255,255,255,.4)}
.app-body{flex:1;display:flex;flex-direction:column}

/* DISC PANEL */
.disc-panel{display:none;flex-direction:column;flex:1}.disc-panel.active{display:flex}
.disc-header{background:var(--card-bg);border-bottom:1px solid var(--rule);padding:26px 36px 22px;display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end;transition:background .4s,border-color .4s}
.disc-header-left{flex:1;min-width:240px}
.disc-code{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--coral);margin-bottom:5px}
.disc-title{font-size:clamp(1.4rem,3vw,2rem);font-weight:800;line-height:1.2;color:var(--teal)}.disc-title em{color:var(--coral);font-style:normal}
.disc-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.disc-chip{font-size:11px;font-weight:600;letter-spacing:.03em;padding:4px 12px;border-radius:20px;background:var(--paper2);border:1px solid var(--rule);color:var(--muted);transition:background .4s,border-color .4s}
.disc-progress-wrap{display:flex;align-items:center;gap:10px;margin-top:14px}
.disc-progress-label{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap}.disc-progress-label strong{color:var(--coral)}
.disc-progress-bg{flex:1;height:5px;border-radius:3px;background:var(--paper3);overflow:hidden;max-width:200px}
.disc-progress-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* Week strip */
.week-strip{background:var(--paper);border-bottom:1px solid var(--rule);display:flex;overflow-x:auto;padding:0 36px;scrollbar-width:none;transition:background .4s}.week-strip::-webkit-scrollbar{display:none}
.week-pill{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:12px 14px;cursor:pointer;white-space:nowrap;color:var(--muted);border-bottom:3px solid transparent;transition:color .18s,border-color .18s;flex-shrink:0}
.week-pill:hover{color:var(--ink)}.week-pill.active{color:var(--coral);border-bottom-color:var(--coral)}
.disc-content{flex:1;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:272px;flex-shrink:0;background:var(--card-bg);border-right:1px solid var(--rule);padding:0 0 20px;overflow-y:auto;transition:background .4s,border-color .4s}
.sidebar-search{padding:12px 14px;border-bottom:1px solid var(--rule);position:sticky;top:0;background:var(--card-bg);z-index:2;transition:background .4s}
.sidebar-search input{width:100%;background:var(--paper);border:1.5px solid var(--rule);border-radius:var(--r-sm);padding:8px 10px 8px 30px;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink);outline:none;transition:border-color .2s,background .4s}
.sidebar-search input:focus{border-color:var(--coral)}
.sidebar-search .s-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);pointer-events:none}
.sidebar-section-title{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--coral);padding:0 18px 6px;margin-top:18px}
.sidebar-section-title:first-of-type{margin-top:14px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink);border-left:3px solid transparent;transition:all .15s;line-height:1.35}
.sidebar-item:hover{background:var(--paper)}.sidebar-item.active{background:var(--coral-lt);border-left-color:var(--coral);color:var(--coral-dk);font-weight:700}
html.dark .sidebar-item.active{color:#ff8a74}
.sidebar-item .si-num{font-size:10px;font-weight:700;color:var(--muted);width:20px;flex-shrink:0}
.sidebar-item .si-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-item .si-title{flex:1;font-size:12px;line-height:1.3}
.sidebar-item.hidden,.sidebar-section-title.hidden{display:none}
.si-check{appearance:none;-webkit-appearance:none;width:16px;height:16px;border-radius:4px;border:1.5px solid var(--rule);background:transparent;cursor:pointer;flex-shrink:0;position:relative;transition:border-color .2s,background .2s}
.si-check:checked{border-color:var(--coral);background:var(--coral)}
.si-check:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:800}
.si-check:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.sidebar-item.completed .si-title{text-decoration:line-through;opacity:.5}

/* Viewer */
.viewer-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--viewer-bg);transition:background .4s}
.viewer-toolbar{background:var(--viewer-toolbar);border-bottom:1px solid rgba(255,255,255,.07);padding:10px 18px;display:flex;align-items:center;gap:10px;transition:background .4s}
.viewer-week-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);flex:1}
.viewer-btn{font-size:11px;font-weight:700;letter-spacing:.04em;padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s}
.viewer-btn:hover{background:rgba(255,255,255,.14);color:rgba(255,255,255,.95)}
.viewer-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.viewer-btn.accent{background:rgba(232,85,62,.22);border-color:rgba(232,85,62,.5);color:#ff8a74}.viewer-btn.accent:hover{background:rgba(232,85,62,.38)}
.viewer-frame{flex:1;width:100%;border:none}
.viewer-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center}
.viewer-placeholder .vp-icon{font-size:3rem;opacity:.25}
.viewer-placeholder .vp-msg{font-size:13px;font-weight:500;color:rgba(255,255,255,.3)}

/* Notes */
.notes-panel{background:var(--viewer-toolbar);border-top:1px solid rgba(255,255,255,.07);padding:0;display:flex;flex-direction:column;max-height:220px;transition:background .4s}
.notes-header{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.45);border-bottom:1px solid rgba(255,255,255,.05)}
.notes-header .nh-icon{font-size:13px}.notes-header .nh-count{margin-left:auto;font-weight:500;font-size:10px;letter-spacing:0;text-transform:none;opacity:.5}
.notes-header .nh-saved{color:#4ecdc4;font-size:10px;font-weight:600;letter-spacing:0;text-transform:none;opacity:0;transition:opacity .3s}.notes-header .nh-saved.show{opacity:1}
.notes-textarea{flex:1;background:transparent;border:none;color:rgba(255,255,255,.8);font-family:var(--mono);font-size:12px;line-height:1.7;padding:10px 18px;resize:none;outline:none;scrollbar-width:thin}
.notes-textarea::placeholder{color:rgba(255,255,255,.2)}
.si-note-icon{font-size:9px;flex-shrink:0;opacity:.5}

/* Timer */
.timer-wrap{display:flex;align-items:center;gap:6px}
.timer-display{font-family:var(--mono);font-size:12px;font-weight:700;color:#4ecdc4;min-width:48px;text-align:center;padding:3px 8px;background:rgba(78,205,196,.1);border-radius:12px;border:1px solid rgba(78,205,196,.2)}
.timer-display.running{animation:timerPulse 2s ease-in-out infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.6}}
.timer-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.timer-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.timer-btn.active{background:rgba(78,205,196,.2);border-color:rgba(78,205,196,.4);color:#4ecdc4}
.dash-card-study{font-size:10px;font-weight:600;color:var(--teal);margin-top:4px;display:flex;align-items:center;gap:4px}

/* ADD MODAL */
#modal-adddis{display:none;position:fixed;inset:0;z-index:200;background:rgba(26,26,26,.55);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:24px}
#modal-adddis.open{display:flex}
.modal-card{background:var(--card-bg);border:1px solid var(--rule);border-top:4px solid var(--coral);border-radius:14px;padding:36px 40px 32px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(26,26,26,.18);animation:popIn .2s ease;transition:background .4s,border-color .4s}
@keyframes popIn{from{transform:scale(.96) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-title{font-size:1.6rem;font-weight:800;color:var(--teal);margin-bottom:4px}
.modal-subtitle{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:28px}
.modal-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;display:block}
.modal-input{width:100%;background:var(--paper);border:1.5px solid var(--rule);border-radius:var(--r-sm);padding:11px 14px;font-family:var(--sans);font-size:14px;color:var(--ink);outline:none;margin-bottom:16px;transition:border-color .2s,box-shadow .2s,background .4s}
.modal-input:focus{border-color:var(--coral);box-shadow:0 0 0 3px var(--coral-lt)}
.modal-row{display:flex;gap:12px}.modal-row .modal-input{margin-bottom:0}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.modal-btn-cancel{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:10px 20px;border-radius:20px;background:transparent;border:1.5px solid var(--rule);color:var(--muted);cursor:pointer;transition:all .15s}
.modal-btn-cancel:hover{border-color:var(--ink);color:var(--ink)}
.modal-btn-add{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:10px 24px;border-radius:20px;background:var(--coral);border:none;color:white;cursor:pointer;transition:background .18s,box-shadow .18s;box-shadow:0 4px 14px rgba(232,85,62,.3)}
.modal-btn-add:hover{background:var(--coral-dk);box-shadow:0 6px 20px rgba(232,85,62,.4)}
.color-picker{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.color-swatch:hover{transform:scale(1.18)}.color-swatch.selected{border-color:var(--ink)}

/* DASHBOARD */
#panel-dashboard{padding:44px 36px;background:var(--paper);transition:background .4s}
.dash-greeting{font-size:2rem;font-weight:800;color:var(--teal);margin-bottom:4px}
.dash-sub{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:32px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin-bottom:40px}
.dash-card{background:var(--card-bg);border:1px solid var(--rule);border-radius:12px;padding:24px;cursor:pointer;transition:transform .18s,box-shadow .2s,background .4s;position:relative;overflow:hidden}
.dash-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(26,26,26,.10)}
.dash-card:focus-visible{outline:2px solid var(--coral);outline-offset:2px}
.dash-card-code{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--coral);margin-bottom:7px}
.dash-card-title{font-size:1.1rem;font-weight:800;color:var(--teal);line-height:1.3;margin-bottom:14px}
.dash-card-progress{background:var(--paper2);border-radius:4px;height:4px;overflow:hidden}
.dash-card-bar{height:100%;border-radius:4px;transition:width .4s}
.dash-card-meta{font-size:11px;font-weight:500;color:var(--muted);margin-top:8px}
.dash-card-add{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:transparent;border:2px dashed rgba(232,85,62,.3);border-radius:12px;cursor:pointer;color:rgba(232,85,62,.5);transition:border-color .18s,color .18s,background .18s;min-height:130px}
.dash-card-add:hover{border-color:var(--coral);color:var(--coral);background:var(--coral-lt)}

.login-toggle span{text-decoration:underline}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.login-success{background:rgba(26,95,110,.08);border:1.5px solid rgba(26,95,110,.3);border-radius:var(--r-sm);padding:10px 14px;font-size:12px;font-weight:600;color:var(--teal);margin-top:14px;display:none;text-align:center}.login-success.show{display:block}
#reg-confirm{margin-bottom:18px}

<script>
/* ═══ UTILS ═══ */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function loadData(k,f){try{const v=localStorage.getItem('scaff_'+k);return v?JSON.parse(v):f}catch{return f}}
function saveData(k,v){localStorage.setItem('scaff_'+k,JSON.stringify(v))}

/* ═══ THEME ═══ */
function loadTheme(){applyTheme(loadData('theme','light'))}
function applyTheme(m){document.documentElement.classList.toggle('dark',m==='dark');const b=document.getElementById('theme-btn');if(b){b.textContent=m==='dark'?'☀️':'🌙';b.setAttribute('aria-label',m==='dark'?'Tema claro':'Tema escuro')}}
function toggleTheme(){const n=document.documentElement.classList.contains('dark')?'light':'dark';saveData('theme',n);applyTheme(n)}
loadTheme();

/* ═══ FIREBASE ═══ */
const firebaseConfig={apiKey:"AIzaSyBjzVzGpqBZHPRyp1n4EuDs5dgJFJFRVz0",authDomain:"scaff-90d82.firebaseapp.com",projectId:"scaff-90d82",storageBucket:"scaff-90d82.firebasestorage.app",messagingSenderId:"491318718256",appId:"1:491318718256:web:fdc46fa2e0e28a075e22f5"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

/* ═══ AUTH ═══ */
const USERS={"estudante":"scaff2025","wallace":"deq2025","admin":"scaffadm"};

function showLogin(){document.getElementById('form-login').style.display='block';document.getElementById('form-register').style.display='none';document.getElementById('login-error').classList.remove('show')}
function showRegister(){document.getElementById('form-login').style.display='none';document.getElementById('form-register').style.display='block';document.getElementById('reg-error').classList.remove('show');document.getElementById('reg-success').classList.remove('show')}
function toggleRegPassVis(btn){const inp=btn.previousElementSibling;const show=inp.type==='password';inp.type=show?'text':'password';btn.textContent=show?'\u{1F648}':'\u{1F441}';btn.setAttribute('aria-label',show?'Ocultar senha':'Mostrar senha')}

function authError(code){
  const m={'auth/invalid-email':'E-mail inválido.','auth/user-not-found':'Usuário não encontrado. Crie uma conta.','auth/wrong-password':'Senha incorreta.','auth/invalid-credential':'E-mail ou senha incorretos.','auth/email-already-in-use':'Este e-mail já está cadastrado.','auth/weak-password':'Senha muito fraca (mínimo 6 caracteres).','auth/too-many-requests':'Muitas tentativas. Aguarde e tente novamente.','auth/network-request-failed':'Sem conexão. Tente o login offline.'};
  return m[code]||'Erro: '+code;
}

function enterApp(user){
  const name=user.email?user.email.split('@')[0]:(user.displayName||user);
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  document.getElementById('topbar-username').textContent=name;
  initApp();
}

async function doLogin(){
  const email=document.getElementById('inp-user').value.trim(),pass=document.getElementById('inp-pass').value,err=document.getElementById('login-error'),btn=document.getElementById('btn-login');
  if(!email||!pass){err.textContent='Preencha e-mail e senha.';err.classList.add('show');return}
  err.classList.remove('show');
  // Try offline demo first
  const username=email.includes('@')?email.split('@')[0]:email;
  if(USERS[username]&&USERS[username]===pass){enterApp({email:username+'@demo',displayName:username});return}
  // Firebase Auth
  btn.disabled=true;btn.textContent='Entrando...';
  try{const cred=await auth.signInWithEmailAndPassword(email,pass);enterApp(cred.user)}
  catch(e){err.textContent=authError(e.code);err.classList.add('show');document.getElementById('inp-pass').value=''}
  finally{btn.disabled=false;btn.textContent='Entrar na Biblioteca'}
}

async function doRegister(){
  const email=document.getElementById('reg-email').value.trim(),pass=document.getElementById('reg-pass').value,confirm=document.getElementById('reg-confirm').value;
  const err=document.getElementById('reg-error'),ok=document.getElementById('reg-success'),btn=document.getElementById('btn-register');
  err.classList.remove('show');ok.classList.remove('show');
  if(!email||!pass){err.textContent='Preencha todos os campos.';err.classList.add('show');return}
  if(pass!==confirm){err.textContent='As senhas não coincidem.';err.classList.add('show');return}
  if(pass.length<6){err.textContent='Senha deve ter no mínimo 6 caracteres.';err.classList.add('show');return}
  btn.disabled=true;btn.textContent='Criando conta...';
  try{
    await auth.createUserWithEmailAndPassword(email,pass);
    ok.textContent='\u2705 Conta criada! Redirecionando...';
    ok.classList.add('show');
    setTimeout(()=>{showLogin();document.getElementById('inp-user').value=email},1500);
  }catch(e){err.textContent=authError(e.code);err.classList.add('show')}
  finally{btn.disabled=false;btn.textContent='Criar Conta'}
}

function doLogout(){
  auth.signOut().catch(()=>{});
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('inp-pass').value='';
  document.getElementById('inp-user').value='';
  STATE.disciplines=[...DEFAULT_DISCIPLINES];STATE.activeDisc=null;
  showLogin();
}

/* ═══ DATA ═══ */
const MOD_COLORS={conv:"#c8502a",cond:"#2a4a6a",rad:"#6a4a2a"};
const MOD_LABELS={conv:"Convecção",cond:"Condução",rad:"Radiação"};
const TE0418_WEEKS=[
  {num:"01",mod:"conv",title:"Introdução à Convecção & Camada Limite",cap:"Cap. 6.1–6.4"},

  {num:"18",mod:"rad",title:"Radiação Solar & Revisão Final — P3",cap:"Cap. 12.8"},
];
const DEFAULT_DISCIPLINES=[
  {id:"te0418",code:"TE0418",color:"#1a3a2a",name:"Transferência de Calor e Massa",sem:"5° Semestre",book:"Incropera 7ª ed.",weeks:TE0418_WEEKS},
  {id:"mat201",code:"MAT201",color:"#2a4a6a",name:"Cálculo Diferencial e Integral III",sem:"3° Semestre",book:"Stewart 8ª ed.",
    weeks:["Séries de Taylor","Integrais Múltiplas","Campos Vetoriais","Teorema de Green","Integrais de Linha","Teorema de Stokes","Integrais de Superfície","Equações Diferenciais","Transformada de Laplace","Séries de Fourier","Equações a Derivadas Parciais","Método da Separação","Revisão Integrada A","Prova Final"].map((t,i)=>({num:String(i+1).padStart(2,"0"),mod:i<5?"A":i<10?"B":"C",title:t,cap:`Cap. ${i+1}`}))},
  {id:"qui301",code:"QUI301",color:"#c8502a",name:"Termodinâmica Química",sem:"4° Semestre",book:"Smith, Van Ness & Abbott",
    weeks:["1ª Lei","2ª Lei","Propriedades PVT","Equações de Estado","Propriedades Calóricas","Equilíbrio de Fases","Regra de Fases","Diagramas PT e PV","Equilíbrio Líq-Vap","Soluções Ideais","Soluções Reais","Fugacidade","Equilíbrio Químico","Energia de Gibbs","Revisão Termodinâmica","Prova Final"].map((t,i)=>({num:String(i+1).padStart(2,"0"),mod:i<6?"I":i<12?"II":"III",title:t,cap:`Cap. ${i+1}`}))},
];
const STATE={disciplines:[...DEFAULT_DISCIPLINES],activeDisc:null,activeWeeks:{},selectedColor:"#1a3a2a"};

/* ═══ PROGRESS ═══ */
function getProgress(){return loadData('progress',{})}
function setWeekDone(did,wn,done){const p=getProgress();if(!p[did])p[did]={};p[did][wn]=done;saveData('progress',p)}
function isWeekDone(did,wn){const p=getProgress();return !!(p[did]&&p[did][wn])}
function calcProgress(did){const d=STATE.disciplines.find(x=>x.id===did);if(!d)return 0;const p=getProgress();const dp=p[did]||{};return Math.round((d.weeks.filter(w=>dp[w.num]).length/d.weeks.length)*100)}

/* ═══ NOTES ═══ */
function getAllNotes(){return loadData('notes',{})}
function getNote(did,wn){const n=getAllNotes();return (n[did]&&n[did][wn])||''}
function saveNote(did,wn,text){const n=getAllNotes();if(!n[did])n[did]={};if(text.trim())n[did][wn]=text;else delete n[did][wn];saveData('notes',n)}
function hasNote(did,wn){const n=getAllNotes();return !!(n[did]&&n[did][wn]&&n[did][wn].trim())}
let _noteTimer=null;
function autoSaveNote(did,wn,textarea){
  clearTimeout(_noteTimer);
  _noteTimer=setTimeout(()=>{
    saveNote(did,wn,textarea.value);
    const saved=document.getElementById('note-saved-'+did);
    if(saved){saved.classList.add('show');setTimeout(()=>saved.classList.remove('show'),1200)}
    const si=document.getElementById('si-'+did+'-'+wn);
    if(si){let icon=si.querySelector('.si-note-icon');if(textarea.value.trim()){if(!icon){icon=document.createElement('span');icon.className='si-note-icon';icon.textContent='📝';si.insertBefore(icon,si.querySelector('.si-check'))}}else{if(icon)icon.remove()}}
  },400);
}

/* ═══ INIT ═══ */
function initApp(){renderTabs();renderAppBody();showDashboard()}

/* ═══ TABS ═══ */
function renderTabs(){
  const bar=document.getElementById("tabs-bar");
  bar.innerHTML=`<div class="tab ${!STATE.activeDisc?'active':''}" onclick="showDashboard()" role="tab" aria-selected="${!STATE.activeDisc}"><span>Início</span></div>`
    +STATE.disciplines.map(d=>`<div class="tab ${STATE.activeDisc===d.id?'active':''}" id="tab-${esc(d.id)}" onclick="openDisc('${esc(d.id)}')" role="tab" aria-selected="${STATE.activeDisc===d.id}">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${esc(d.color)};margin-right:2px"></span>${esc(d.code)}
      <button class="tab-close" onclick="event.stopPropagation();closeDisc('${esc(d.id)}')" aria-label="Fechar ${esc(d.code)}">×</button></div>`).join("")}

/* ═══ APP BODY ═══ */
function renderAppBody(){
  document.getElementById("app-body").innerHTML=`<div id="panel-dashboard" style="display:none;padding:44px 36px;background:var(--paper);flex:1;overflow-y:auto;transition:background .4s">
    <div class="dash-greeting fade-up">Bem-vindo à Scaff ✦</div>
    <p class="dash-sub fade-up delay-1">Suas disciplinas ativas — selecione para estudar</p>
    <div class="dash-grid" id="dash-grid"></div></div>`+STATE.disciplines.map(d=>buildDiscPanel(d)).join("");
  renderDashGrid()}

function renderDashGrid(){
  const g=document.getElementById("dash-grid");if(!g)return;
  g.innerHTML=STATE.disciplines.map((d,i)=>{const pct=calcProgress(d.id);return`<div class="dash-card fade-up delay-${Math.min(i+1,4)}" onclick="openDisc('${esc(d.id)}')" tabindex="0" role="button" aria-label="${esc(d.code)} — ${esc(d.name)}">
    <div style="position:absolute;top:0;left:0;right:0;height:4px;border-radius:12px 12px 0 0;background:${esc(d.color)}"></div>
    <div class="dash-card-code">${esc(d.code)} · ${esc(d.sem)}</div>
    <div class="dash-card-title">${esc(d.name)}</div>
    <div class="dash-card-progress"><div class="dash-card-bar" style="width:${pct}%;background:${esc(d.color)}"></div></div>
    <div class="dash-card-meta">${pct}% concluído · ${d.weeks.length} semanas · ${esc(d.book)}</div>
    ${getStudyTime(d.id)>0?`<div class="dash-card-study">⏱ ${formatStudyTime(getStudyTime(d.id))} estudadas</div>`:''}</div>`}).join("")
    +`<div class="dash-card dash-card-add fade-up" onclick="openAddModal()" tabindex="0" role="button" aria-label="Nova disciplina"><div class="add-icon">＋</div><div class="add-label">Nova Disciplina</div></div>`}

function buildDiscPanel(d){
  const groups={};d.weeks.forEach(w=>{if(!groups[w.mod])groups[w.mod]=[];groups[w.mod].push(w)});
  const pct=calcProgress(d.id);
  const sidebarItems=Object.entries(groups).map(([mod,weeks])=>`<div class="sidebar-section-title" data-mod="${esc(mod)}">${esc(MOD_LABELS[mod]||('Módulo '+mod))}</div>
    ${weeks.map(w=>{const done=isWeekDone(d.id,w.num);return`<div class="sidebar-item ${done?'completed':''}" id="si-${esc(d.id)}-${esc(w.num)}" onclick="openWeek('${esc(d.id)}','${esc(w.num)}')" data-title="${esc(w.title.toLowerCase())}" data-cap="${esc(w.cap.toLowerCase())}">
      <span class="si-num">${esc(w.num)}</span><span class="si-dot" style="background:${esc(MOD_COLORS[w.mod]||d.color)}"></span>
      <span class="si-title">${esc(w.title)}</span>
      ${hasNote(d.id,w.num)?'<span class="si-note-icon">📝</span>':''}
      <input type="checkbox" class="si-check" ${done?'checked':''} onclick="event.stopPropagation();toggleWeekDone('${esc(d.id)}','${esc(w.num)}',this)" aria-label="Marcar semana ${esc(w.num)} concluída" title="Concluída"></div>`}).join("")}`).join("");
  const weekPills=Object.entries(groups).map(([mod,weeks])=>
    `<div class="week-pill" style="color:${esc(MOD_COLORS[mod]||d.color)};cursor:default;font-weight:800;font-size:10px;letter-spacing:.12em">▸ ${esc(MOD_LABELS[mod]||mod)}</div>`+
    weeks.map(w=>`<div class="week-pill" id="wp-${esc(d.id)}-${esc(w.num)}" onclick="openWeek('${esc(d.id)}','${esc(w.num)}')">S${esc(w.num)}</div>`).join("")).join("");
  return`<div class="disc-panel" id="panel-${esc(d.id)}" role="tabpanel">
    <div class="disc-header"><div class="disc-header-left">
      <div class="disc-code">${esc(d.code)} · ${esc(d.sem)}</div>
      <div class="disc-title">${esc(d.name)}</div>
      <div class="disc-meta"><span class="disc-chip">${esc(d.book)}</span><span class="disc-chip">${d.weeks.length} semanas</span></div>
      <div class="disc-progress-wrap"><span class="disc-progress-label" id="prog-label-${esc(d.id)}"><strong>${pct}%</strong> concluído</span>
        <div class="disc-progress-bg"><div class="disc-progress-fill" id="prog-fill-${esc(d.id)}" style="width:${pct}%;background:${esc(d.color)}"></div></div></div>
    </div></div>
    <div class="week-strip">${weekPills}</div>
    <div class="disc-content">
      <div class="sidebar" id="sidebar-${esc(d.id)}">
        <div class="sidebar-search" style="position:relative"><span class="s-icon">🔍</span>
          <input type="text" placeholder="Filtrar semanas..." oninput="filterSidebar('${esc(d.id)}',this.value)" aria-label="Filtrar semanas"></div>
        ${sidebarItems}</div>
      <div class="viewer-area" id="viewer-${esc(d.id)}"><div class="viewer-placeholder"><div class="vp-icon">📖</div><div class="vp-msg">Selecione uma semana na barra lateral</div></div></div>
    </div></div>`}

/* ═══ PROGRESS TOGGLE ═══ */
function toggleWeekDone(did,wn,cb){setWeekDone(did,wn,cb.checked);const item=document.getElementById('si-'+did+'-'+wn);if(item)item.classList.toggle('completed',cb.checked);updateDiscProgress(did)}
function updateDiscProgress(did){const pct=calcProgress(did);const l=document.getElementById('prog-label-'+did);const f=document.getElementById('prog-fill-'+did);if(l)l.innerHTML=`<strong>${pct}%</strong> concluído`;if(f)f.style.width=pct+'%'}

/* ═══ SIDEBAR FILTER ═══ */
function filterSidebar(did,query){
  const q=query.toLowerCase().trim(),sb=document.getElementById('sidebar-'+did);if(!sb)return;
  sb.querySelectorAll('.sidebar-item').forEach(item=>{const match=!q||(item.dataset.title||'').includes(q)||(item.dataset.cap||'').includes(q);item.classList.toggle('hidden',!match)});
  sb.querySelectorAll('.sidebar-section-title').forEach(sec=>{let n=sec.nextElementSibling,any=false;while(n&&!n.classList.contains('sidebar-section-title')){if(n.classList.contains('sidebar-item')&&!n.classList.contains('hidden'))any=true;n=n.nextElementSibling}sec.classList.toggle('hidden',!any)})}

/* ═══ NAVIGATION ═══ */
function showDashboard(){STATE.activeDisc=null;document.querySelectorAll(".disc-panel").forEach(p=>p.classList.remove("active"));const d=document.getElementById("panel-dashboard");d.style.display="flex";d.style.flexDirection="column";renderDashGrid();renderTabs()}
function openDisc(id){STATE.activeDisc=id;document.getElementById("panel-dashboard").style.display="none";document.querySelectorAll(".disc-panel").forEach(p=>p.classList.remove("active"));const panel=document.getElementById("panel-"+id);if(panel)panel.classList.add("active");renderTabs();const last=STATE.activeWeeks[id];if(last)openWeek(id,last,false)}
function closeDisc(id){if(!confirm('Remover '+id.toUpperCase()+' da sessão?'))return;STATE.disciplines=STATE.disciplines.filter(d=>d.id!==id);if(STATE.activeDisc===id)STATE.activeDisc=null;renderTabs();renderAppBody();showDashboard()}
function openWeek(did,wn,scroll=true){
  STATE.activeWeeks[did]=wn;const disc=STATE.disciplines.find(d=>d.id===did),week=disc.weeks.find(w=>w.num===wn);
  document.querySelectorAll(`[id^="si-${did}-"]`).forEach(el=>el.classList.remove("active"));
  const si=document.getElementById(`si-${did}-${wn}`);if(si){si.classList.add("active");if(scroll)si.scrollIntoView({block:"nearest"})}
  document.querySelectorAll(`[id^="wp-${did}-"]`).forEach(el=>el.classList.remove("active"));
  const wp=document.getElementById(`wp-${did}-${wn}`);if(wp)wp.classList.add("active");
  const v=document.getElementById("viewer-"+did),mc=MOD_COLORS[week.mod]||disc.color;
  const toolbar=`<div class="viewer-toolbar"><div class="viewer-week-title"><span style="color:${esc(mc)};margin-right:6px">●</span>Semana ${esc(week.num)} · ${esc(week.title)}<span style="opacity:.4;margin:0 8px">·</span><span style="opacity:.5">${esc(week.cap)}</span></div>
    <button class="viewer-btn" onclick="prevWeek('${esc(did)}','${esc(wn)}')" aria-label="Semana anterior">← Anterior</button>
    <button class="viewer-btn" onclick="nextWeek('${esc(did)}','${esc(wn)}')" aria-label="Próxima semana">Próxima →</button>
    <button class="viewer-btn accent" onclick="downloadWeek('${esc(did)}','${esc(wn)}')" aria-label="Baixar PDF">⬇ PDF</button>
    <div class="timer-wrap">
      <button class="timer-btn ${TIMER.running&&TIMER.did===did?'active':''}" onclick="toggleTimer('${esc(did)}')"
        id="timer-play-${esc(did)}" title="Iniciar Pomodoro" aria-label="Iniciar timer">${TIMER.running&&TIMER.did===did?'⏸':'▶'}</button>
      <span class="timer-display ${TIMER.running&&TIMER.did===did?'running':''}" id="timer-disp-${esc(did)}">${formatTimer(TIMER.did===did?TIMER.remaining:TIMER.duration)}</span>
      <button class="timer-btn" onclick="resetTimer('${esc(did)}')" title="Reiniciar timer" aria-label="Reiniciar timer">↻</button>
    </div></div>`;
  if(week.pdfUrl){
    v.innerHTML=toolbar+`<iframe class="viewer-frame" src="${esc(week.pdfUrl)}" title="PDF — ${esc(disc.code)} Semana ${esc(week.num)}"></iframe>`;
  } else {
    const pdfPath=`./pdfs/${did}-s${wn}.pdf`;
    v.innerHTML=toolbar+`<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:40px;background:var(--viewer-bg)">
      <div style="width:80px;height:80px;border-radius:50%;background:${mc}22;border:2px solid ${mc}55;display:flex;align-items:center;justify-content:center;font-size:2rem">📄</div>
      <div style="text-align:center">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:${mc};margin-bottom:6px">${esc(disc.code)} · Semana ${esc(week.num)}</div>
        <div style="font-size:1.4rem;color:#f0f0f0;font-weight:800;margin-bottom:6px;line-height:1.3">${esc(week.title)}</div>
        <div style="font-size:12px;font-weight:500;color:rgba(255,255,255,.35)">${esc(week.cap)} · ${esc(disc.book)}</div>
      </div>
      <button class="viewer-btn accent" style="padding:10px 28px;font-size:12px;font-weight:800;border-radius:20px;margin-top:8px" onclick="downloadWeek('${esc(did)}','${esc(wn)}')">⬇ Baixar PDF desta semana</button>
      <div style="font-size:11px;color:rgba(255,255,255,.18);margin-top:12px;text-align:center;max-width:380px;line-height:2">
        Nenhum PDF vinculado ainda.<br>
        Coloque o arquivo em <code style="background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px;font-size:10px">${esc(pdfPath)}</code><br>
        ou defina <code style="background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px;font-size:10px">week.pdfUrl</code> nos dados.
      </div></div>`;
  }
  // Notes panel (always shown)
  const noteText=getNote(did,wn).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  v.innerHTML+=`<div class="notes-panel">
    <div class="notes-header"><span class="nh-icon">📝</span> Anotações
      <span class="nh-saved" id="note-saved-${esc(did)}">salvo ✓</span>
      <span class="nh-count" id="note-count-${esc(did)}">${getNote(did,wn).length} chars</span></div>
    <textarea class="notes-textarea" id="note-ta-${esc(did)}-${esc(wn)}" placeholder="Escreva suas anotações sobre esta semana..."
      oninput="autoSaveNote('${esc(did)}','${esc(wn)}',this);document.getElementById('note-count-${esc(did)}').textContent=this.value.length+' chars'">${noteText}</textarea></div>`;
}
function prevWeek(did,wn){const d=STATE.disciplines.find(x=>x.id===did),i=d.weeks.findIndex(w=>w.num===wn);if(i>0)openWeek(did,d.weeks[i-1].num)}
function nextWeek(did,wn){const d=STATE.disciplines.find(x=>x.id===did),i=d.weeks.findIndex(w=>w.num===wn);if(i<d.weeks.length-1)openWeek(did,d.weeks[i+1].num)}
function downloadWeek(did,wn){alert(`[Scaff] Em produção: download do PDF\n${did.toUpperCase()} · Semana ${wn}`)}

/* ═══ POMODORO TIMER ═══ */
const TIMER={running:false,did:null,interval:null,remaining:25*60,duration:25*60,startedAt:null};
function formatTimer(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function getStudyTime(did){const t=loadData('studytime',{});return t[did]||0}
function addStudyTime(did,mins){const t=loadData('studytime',{});t[did]=(t[did]||0)+mins;saveData('studytime',t)}
function formatStudyTime(mins){if(mins<60)return mins+'min';const h=Math.floor(mins/60),m=mins%60;return h+'h'+(m?String(m).padStart(2,'0')+'m':'')}

function toggleTimer(did){
  if(TIMER.running&&TIMER.did===did){pauseTimer();return}
  if(TIMER.running&&TIMER.did!==did)pauseTimer();
  TIMER.did=did;TIMER.running=true;TIMER.startedAt=Date.now();
  const disp=document.getElementById('timer-disp-'+did),btn=document.getElementById('timer-play-'+did);
  if(disp)disp.classList.add('running');
  if(btn){btn.classList.add('active');btn.textContent='\u23F8'}
  TIMER.interval=setInterval(()=>{
    TIMER.remaining--;
    const d2=document.getElementById('timer-disp-'+TIMER.did);
    if(d2)d2.textContent=formatTimer(TIMER.remaining);
    if(TIMER.remaining<=0){finishTimer()}
  },1000);
}
function pauseTimer(){
  TIMER.running=false;clearInterval(TIMER.interval);
  if(TIMER.startedAt){const mins=Math.round((Date.now()-TIMER.startedAt)/60000);if(mins>0)addStudyTime(TIMER.did,mins);TIMER.startedAt=null}
  const disp=document.getElementById('timer-disp-'+TIMER.did),btn=document.getElementById('timer-play-'+TIMER.did);
  if(disp)disp.classList.remove('running');
  if(btn){btn.classList.remove('active');btn.textContent='\u25B6'}
}
function resetTimer(did){
  if(TIMER.running&&TIMER.did===did)pauseTimer();
  TIMER.remaining=TIMER.duration;TIMER.did=did;
  const disp=document.getElementById('timer-disp-'+did);
  if(disp){disp.textContent=formatTimer(TIMER.duration);disp.classList.remove('running')}
}
function finishTimer(){
  const mins=Math.round(TIMER.duration/60);
  addStudyTime(TIMER.did,mins);
  clearInterval(TIMER.interval);TIMER.running=false;TIMER.remaining=TIMER.duration;TIMER.startedAt=null;
  playBeep();
  const disp=document.getElementById('timer-disp-'+TIMER.did),btn=document.getElementById('timer-play-'+TIMER.did);
  if(disp){disp.textContent='00:00';disp.classList.remove('running')}
  if(btn){btn.classList.remove('active');btn.textContent='\u25B6'}
  setTimeout(()=>{if(disp)disp.textContent=formatTimer(TIMER.duration)},3000);
}
function playBeep(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();for(let i=0;i<3;i++){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.value=0.15;o.start(ctx.currentTime+i*0.25);o.stop(ctx.currentTime+i*0.25+0.15)}}catch(e){}
}

/* ═══ PASSWORD TOGGLE ═══ */
function togglePassVis(){
  const inp=document.getElementById('inp-pass'),btn=document.getElementById('pass-toggle-btn');
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.textContent=show?'🙈':'👁';
  btn.setAttribute('aria-label',show?'Ocultar senha':'Mostrar senha');
  btn.title=show?'Ocultar senha':'Mostrar senha';
}

/* ═══ ADD MODAL ═══ */
let lastFocused=null;
function openAddModal(){lastFocused=document.activeElement;document.getElementById("modal-adddis").classList.add("open");requestAnimationFrame(()=>document.getElementById("new-code").focus())}
function closeAddModal(){document.getElementById("modal-adddis").classList.remove("open");if(lastFocused){lastFocused.focus();lastFocused=null}}
document.getElementById("modal-adddis").addEventListener("keydown",function(e){if(e.key==='Tab'){const f=this.querySelectorAll('input,button,[tabindex]:not([tabindex="-1"])');if(!f.length)return;const first=f[0],last=f[f.length-1];if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus()}}else{if(document.activeElement===last){e.preventDefault();first.focus()}}}});
document.getElementById("modal-adddis").addEventListener("click",function(e){if(e.target===this)closeAddModal()});
document.querySelectorAll(".color-swatch").forEach(sw=>{sw.addEventListener("click",function(){document.querySelectorAll(".color-swatch").forEach(s=>{s.classList.remove("selected");s.setAttribute('aria-checked','false')});this.classList.add("selected");this.setAttribute('aria-checked','true');STATE.selectedColor=this.dataset.color})});
function addDiscipline(){
  const code=document.getElementById("new-code").value.trim(),name=document.getElementById("new-name").value.trim(),sem=document.getElementById("new-sem").value.trim()||"—",book=document.getElementById("new-book").value.trim()||"—";
  if(!code||!name){alert("Preencha o código e o nome.");return}
  const id=code.toLowerCase().replace(/\W/g,"")+Date.now();
  STATE.disciplines.push({id,code,name,sem,book,color:STATE.selectedColor,weeks:[{num:"01",mod:"A",title:"Semana inicial — adicione conteúdo",cap:"—"}]});
  closeAddModal();["new-code","new-name","new-sem","new-book"].forEach(x=>document.getElementById(x).value="");renderTabs();renderAppBody();openDisc(id)}

/* ═══ KEYBOARD ═══ */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&document.getElementById("modal-adddis").classList.contains("open"))closeAddModal();
  if(e.key==="Enter"&&document.getElementById("screen-login").classList.contains("active")){
    if(document.getElementById('form-register').style.display!=='none')doRegister();
    else doLogin();
  }
});

/* ═══ AUTO-LOGIN (Firebase) ═══ */
auth.onAuthStateChanged(user=>{
  if(user){enterApp(user)}
});
</script>
